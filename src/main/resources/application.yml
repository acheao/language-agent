server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/language_agent}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true



llm:
  base-url: ${LLM_BASE_URL:https://api.siliconflow.cn/v1}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:Pro/deepseek-ai/DeepSeek-V3}
  timeout-ms: 20000
  temperature: 0.2

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}
