services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: language-agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: language_agent
    ports:
      - "${POSTGRES_PORT:-5431}:5432"
    volumes:
      - postgres_data_agent:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agent-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: language-agent-app
    ports:
      - "${APP_PORT:-80}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/language_agent
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - JWT_SECRET=${JWT_SECRET:}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
      - SETTINGS_ENCRYPTION_KEY=${SETTINGS_ENCRYPTION_KEY:}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.siliconflow.cn/v1}
      - LLM_API_KEY=${LLM_API_KEY:}
      - LLM_MODEL=${LLM_MODEL:-Pro/deepseek-ai/DeepSeek-V3}
      - LLM_DEEPSEEK_MODEL=${LLM_DEEPSEEK_MODEL:-${LLM_MODEL:-Pro/deepseek-ai/DeepSeek-V3}}
      - LLM_TRANSLATION_MODEL=${LLM_TRANSLATION_MODEL:-tencent/Hunyuan-MT-7B}
      - MEDIA_STORAGE_ROOT=${MEDIA_STORAGE_ROOT:-/app/data/media}
      - YTDLP_BIN=${YTDLP_BIN:-yt-dlp}
      - ASR_SERVICE_URL=${ASR_SERVICE_URL:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:8080}
    volumes:
      - ./data/media:/app/data/media
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v3/api-docs"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - agent-network
    restart: unless-stopped

networks:
  agent-network:
    driver: bridge

volumes:
  postgres_data_agent:
