services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: language-agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: language_agent
    ports:
      - "5431:5432"
    volumes:
      - postgres_data_agent:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agent-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: language-agent-app
    ports:
      - "80:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/language_agent
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      # Configurable environment variables for one-click deployment
      - LLM_API_KEY=${LLM_API_KEY:}
      - JWT_SECRET=${JWT_SECRET:}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:8080}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v3/api-docs"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - agent-network
    restart: unless-stopped

networks:
  agent-network:
    driver: bridge

volumes:
  postgres_data_agent:
